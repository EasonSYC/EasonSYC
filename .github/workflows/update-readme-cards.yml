name: Update README Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Update README Cards
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.PAT }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&langs_count=6&exclude_repo=covid-19-disease-map,covid-19-visuallization
          path: profile/top-langs.svg
          token: ${{ secrets.PAT }}

    #   - name: Generate pin card
    #     uses: readme-tools/github-readme-stats-action@v1
    #     with:
    #       card: pin
    #       options: username=readme-tools&repo=github-readme-stats
    #       path: profile/pin-readme-tools-github-readme-stats.svg
    #       token: ${{ secrets.PAT }}

      - name: Generate streak stats
        uses: be-next/github-streak-stats-action@v1
        with:
          username: ${{ github.repository_owner }}
          token: ${{ secrets.PAT }}
          output-path: profile/streak.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push